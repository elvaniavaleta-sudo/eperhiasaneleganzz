<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="author" content="Muhamad Nauval Azhar">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta name="description" content="This is a login page template based on Bootstrap 5">
	<title>Log in semar palace!</title>
	<link href="https://jsdelivr.net" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
</head>

<body>
	<section class="h-100">
		<div class="container h-100">
			<div class="row justify-content-sm-center h-100">
				<div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
					<div class="text-center my-5">
						<img src="https://getbootstrap.com" alt="logo" width="100">
					</div>
					<div class="card shadow-lg">
						<div class="card-body p-5">
							<h1 class="fs-4 card-title fw-bold mb-4">Login</h1>
							
							
							<div id="alertBox" class="alert mb-3" style="display:none;"></div>

							<form id="loginForm" method="POST" class="needs-validation" novalidate="" autocomplete="off">
								<div class="mb-3">
									<label class="mb-2 text-muted" for="username">Username id</label>
									<input id="username" type="text" class="form-control" name="username" value="" required autofocus>
									<div class="invalid-feedback">
										Username tidak boleh kosong
									</div>
								</div>

								<div class="mb-3">
									<div class="mb-2 w-100">
										<label class="text-muted" for="password">Password</label>
										<a href="forgot.html" class="float-end">
											Forgot Password?
										</a>
									</div>
									<input id="password" type="password" class="form-control" name="password" required>
								    <div class="invalid-feedback">
								    	Password tidak boleh kosong
							    	</div>
								</div>

								<div class="d-flex align-items-center">
									<div class="form-check">
										<input type="checkbox" name="remember" id="remember" class="form-check-input">
										<label for="remember" class="form-check-label">Remember Me</label>
									</div>
									<button type="submit" class="btn btn-primary ms-auto">
										Login
									</button>
								</div>
							</form>
						</div>
						<div class="card-footer py-3 border-0">
							<div class="text-center">
								Don't have an account? <a href="register.html" class="text-dark">Create One</a>
							</div>
						</div>
					</div>
					<div class="text-center mt-5 text-muted">
						Copyright &copy; 2017-2029 &mdash; Your Company 
					</div>
				</div>
			</div>
		</div>
	</section>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    
    e.preventDefault();
    
    const usernameInput = document.getElementById('username').value.trim();
    const passwordInput = document.getElementById('password').value.trim();
    const alertBox = document.getElementById('alertBox');
    const form = e.target;

    
    form.classList.add('was-validated');

    if (!form.checkValidity()) {
        return;
    }

    
    const usernameBenar = "admin";
    const passwordBenar = "semar123";

   
    if (usernameInput === usernameBenar && passwordInput === passwordBenar) {
      
        alertBox.className = "alert alert-success";
        alertBox.textContent = "Login Berhasil! (Tetap di halaman ini sesuai perintah)";
        alertBox.style.display = "block";
        form.classList.remove('was-validated');
    } else {
        
        alertBox.className = "alert alert-danger";
        alertBox.textContent = "Username atau Password yang Anda masukkan salah!";
        alertBox.style.display = "block";
    }
  });
</script>
<script src="js/login.js"></script>
</body>
</html>
